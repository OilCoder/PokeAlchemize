services:
  pipeline:
    build: .
    container_name: pokeaIchemize_pipeline
    # Access Ollama running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://172.19.16.1:11434
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      # Persist generated images and metadata outside the container
      - ./outputs:/app/outputs
      - ./data/loras:/app/data/loras
      - ./data/pokemon:/app/data/pokemon
      - ./data/types_visual:/app/data/types_visual
      - ./data/prompts:/app/data/prompts
      - ./debug/img:/app/debug/img
      # Mount models cache so they aren't re-downloaded on rebuild
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true

volumes:
  huggingface_cache:
