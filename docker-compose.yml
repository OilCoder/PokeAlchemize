services:
  pipeline:
    build: .
    container_name: pokeaIchemize_pipeline
    # Access Ollama running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://172.19.16.1:11434
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      # Source code — cambios en el host se reflejan en el container sin rebuild
      - ./pipeline:/app/pipeline
      - ./config.py:/app/config.py
      - ./data/pokemons.json:/app/data/pokemons.json
      - ./data/types.json:/app/data/types.json
      # Outputs generados — persisten en el host al parar Docker
      - ./docs/outputs:/app/docs/outputs
      - ./docs/data:/app/docs/data
      - ./data/loras:/app/data/loras
      - ./debug/img:/app/debug/img
      # Mount models cache so they aren't re-downloaded on rebuild
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true

volumes:
  huggingface_cache:
